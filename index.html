<!DOCTYPE html>
<html lang="en">
<head>

<style>
  :root{--bg:#f5f3ee;--panel:#fff;--ink:#16211f;--muted:#6b756f;--line:#e8e4db;--sidebar:#0c1f1e;--sidebar2:#143231;--accent:#0e8c84;--accent-soft:#e2f1ef;--neg:#c2554e;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  .app{display:flex;min-height:100vh}
  /* auth */
  .auth{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 70% -10%,#15403c,#0c1f1e 55%,#081514)}
  .auth-card{width:400px;max-width:100%;background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.4);padding:32px}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:20px}
  .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0a6b64);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
  .brand h1{font-size:17px;margin:0}.brand small{display:block;color:var(--muted);font-size:11px;letter-spacing:.4px}
  .auth h2{font-size:20px;margin:0 0 18px}
  .field{margin-bottom:13px}.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:10px 14px;cursor:pointer}
  .btn:hover{background:#f8fafc}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}.btn.primary:hover{background:#0a6b64}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .full{width:100%;justify-content:center;text-align:center}
  .err{background:#fdeaec;color:var(--neg);font-size:13px;padding:9px 11px;border-radius:8px;margin-bottom:12px;display:none}.err.show{display:block}
  .switch{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}.switch a{color:var(--accent);font-weight:600;cursor:pointer}
  /* shell */
  .sidebar{width:230px;flex:0 0 230px;background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));color:#cdd6e6;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh}
  .sidebar .brand h1{color:#fff}.nav{display:flex;flex-direction:column;gap:3px;margin-top:10px}
  .nav button{display:flex;align-items:center;gap:10px;background:none;border:0;color:#aab6cd;padding:10px 12px;border-radius:9px;font-size:14px;cursor:pointer;text-align:left;font-family:inherit}
  .nav button:hover{background:rgba(255,255,255,.05);color:#fff}.nav button.active{background:rgba(14,140,132,.18);color:#fff}
  .nav-section{color:#62718a;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;margin:16px 4px 4px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
  .nav-group{color:#cdd6e6;font-size:13px;font-weight:600;padding:9px 12px 2px}
  .nav button.sub{padding-left:26px;font-size:13.5px}
  .side-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}
  .side-foot .nm{color:#fff;font-size:13px;font-weight:600}.side-foot .em{color:#7c89a3;font-size:11px}
  .logout{margin-top:10px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:#cdd6e6;padding:8px;border-radius:8px;font-family:inherit;font-size:12.5px;cursor:pointer}
  .logout:hover{background:rgba(194,85,78,.18);color:#fff}
  .main{flex:1;min-width:0}
  .topbar{display:flex;align-items:center;padding:18px 28px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .topbar h2{margin:0;font-size:19px}.topbar p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .content{padding:24px 28px 60px;max-width:1100px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}
  .card h3{margin:0 0 2px;font-size:15px;font-weight:700}.card .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;padding:0 10px 10px}
  td{padding:11px 10px;border-top:1px solid var(--line);font-variant-numeric:tabular-nums}
  .num{text-align:right}.pos{color:var(--accent)}
  .pill{font-size:11.5px;padding:3px 9px;border-radius:20px;background:#eef1f4;color:#475569;font-weight:500}
  .pill.company{background:#e2f1ef;color:#0a6b64}.pill.joint{background:#faeeda;color:#854f0b}.pill.single{background:#eef1f4;color:#475569}.pill.individual{background:#eef1f4;color:#475569}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .l{color:var(--muted);font-size:12.5px}.kpi .v{font-size:23px;font-weight:680;margin-top:6px;letter-spacing:-.5px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .row .field{margin:0}
  input.cell{width:120px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px;text-align:right}
  input.pctin{width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px;text-align:right}
  .del{color:var(--neg);cursor:pointer;background:none;border:0;font-size:13px}
  .hint{color:var(--muted);font-size:13px;padding:18px;text-align:center}
  .dropzone{border:1.5px dashed var(--line);border-radius:10px;padding:18px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;background:#faf9f6;margin-top:8px}
  .dropzone.drag{border-color:var(--accent);background:var(--accent-soft);color:#0a6b64}
  .overlay{position:fixed;inset:0;background:rgba(12,31,30,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;width:560px;max-width:100%;max-height:88vh;overflow:auto;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .modal h3{margin:0 0 4px;font-size:18px;font-weight:700}
  .modal p.s{margin:0 0 16px;color:var(--muted);font-size:13px}
  .modal-foot{display:flex;gap:10px;margin-top:10px}.modal-foot .btn{flex:1;justify-content:center;text-align:center;padding:11px}
  .warn{color:var(--neg);font-size:12px;margin-top:6px}
  .ownrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}.ownrow span{flex:1;font-size:13px}
  label.lbl{display:block;font-size:12.5px;color:var(--muted);margin:0 0 6px}
</style>
</head>
<body>

<div class="auth" id="authScreen">
  <div class="auth-card">
    <div class="brand"><div class="mark">F</div><div><h1>Fridaaay</h1><small>OWNERSHIP</small></div></div>
    <h2 id="authTitle">Sign in</h2>
    <div class="err" id="authErr"></div>
    <div id="suFields" class="hidden">
      <div class="field"><label>Full name</label><input id="suName" placeholder="Amy Ip"/></div>
      <div class="field"><label>Family office / firm</label><input id="suFirm" placeholder="Caas Family Office"/></div>
    </div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@caas.asia"/></div>
    <div class="field"><label>Password</label><input id="pass" type="password" placeholder="••••••••"/></div>
    <button class="btn primary full" id="submit" style="margin-top:4px">Sign in</button>
    <div class="switch" id="switch">No account? <a id="toSignup">Create one</a></div>
  </div>
</div>

<div class="app hidden" id="appRoot">
  <aside class="sidebar">
    <div class="brand"><div class="mark">F</div><div><h1>Fridaaay</h1><small>OWNERSHIP</small></div></div>
    <nav class="nav" id="nav">
      <button data-v="dashboard" class="active">▦ Dashboard</button>
      <button data-v="insights">◔ Insights</button>
      <div class="nav-section">Operation</div>
      <div class="nav-group">Entity</div>
      <button data-v="individual" class="sub">• Individual</button>
      <button data-v="company" class="sub">• Company</button>
      <button data-v="accounts">▤ Bank accounts</button>
      <div class="nav-section">Admin</div>
      <button data-v="timeline">≣ Document log</button>
    </nav>
    <div class="side-foot">
      <div class="nm" id="uName">User</div><div class="em" id="uEmail">—</div>
      <button class="logout" id="logout">Sign out</button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar"><div><h2 id="pTitle">Net worth</h2><p id="pSub">Look-through ownership across all accounts</p></div></header>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="overlay" id="coForm">
  <div class="modal">
    <h3 id="coFormTitle">New company</h3>
    <p class="s" id="coFormNote">Enter the company information.</p>
    <div class="field"><label>Company name</label><input id="cf_name" placeholder="Co-Founder Asia Ltd"/></div>
    <div class="field"><label>Short name</label><input id="cf_short" placeholder="Co-Founder Asia"/></div>
    <div id="cf_brfields"></div>
    <div class="modal-foot"><button class="btn" id="cf_cancel">Cancel</button><button class="btn primary" id="cf_save">Save company</button></div>
  </div>
</div>

<script>
const SUPABASE_URL="https://yblhkvxyhbnnccyagfuq.supabase.co";
const SUPABASE_KEY="sb_publishable_4LwWQtA3axWd9vfV83vJ_A_TnNYMSTd";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:true,detectSessionInUrl:true}});
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
const $=id=>document.getElementById(id);
const uid=()=>(crypto.randomUUID?crypto.randomUUID():"id"+Date.now()+Math.random().toString(36).slice(2));
const fmt=n=>{const neg=n<0;n=Math.abs(Math.round(n));return (neg?"-$":"$")+n.toLocaleString("en-US")};
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
let UID=null, USER=null, M=null, view="dashboard", mode="login", openCompany=null, formFile=null, formBR=null, coEdit=false, brEditMode=false, pendingCap=null;

/* ---------- auth ---------- */
function showErr(m){const e=$("authErr");e.textContent=m;e.classList.add("show");}
function clrErr(){$("authErr").classList.remove("show");}
function setMode(m){mode=m;clrErr();const s=m==="signup";$("suFields").classList.toggle("hidden",!s);
  $("authTitle").textContent=s?"Create your workspace":"Sign in";$("submit").textContent=s?"Create account":"Sign in";
  $("switch").innerHTML=s?`Have an account? <a id="toLogin">Sign in</a>`:`No account? <a id="toSignup">Create one</a>`;wireSwitch();}
function wireSwitch(){const a=$("toSignup"),b=$("toLogin");if(a)a.onclick=()=>setMode("signup");if(b)b.onclick=()=>setMode("login");}
function doAuth(){
  clrErr();const email=$("email").value.trim().toLowerCase(),pass=$("pass").value;
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email))return showErr("Enter a valid email.");
  if(pass.length<6)return showErr("Password must be at least 6 characters.");
  const s=mode==="signup",name=$("suName").value.trim(),firm=$("suFirm").value.trim();
  $("submit").disabled=true;$("submit").textContent="…";
  (async()=>{try{
    if(s){const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name,firm}}});if(error)throw error;
      if(!data.session){showErr("Account created — confirm via email, then sign in.");setMode("login");return;}}
    else{const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;}
    await afterAuth();
  }catch(e){showErr(e.message||"Error");}finally{$("submit").disabled=false;setMode(mode);}})();
}
async function afterAuth(){
  const{data:{user}}=await sb.auth.getUser();if(!user)return showErr("Sign-in failed.");
  UID=user.id;USER={name:(user.user_metadata||{}).name||user.email,email:user.email};
  $("uName").textContent=USER.name;$("uEmail").textContent=USER.email;
  await load();$("authScreen").classList.add("hidden");$("appRoot").classList.remove("hidden");render();
}
async function logout(){try{await sb.auth.signOut();}catch(e){}UID=null;M=null;$("appRoot").classList.add("hidden");$("authScreen").classList.remove("hidden");$("pass").value="";setMode("login");}

/* ---------- data ---------- */
function emptyModel(){return{people:[],companies:[],accounts:[]};}
async function load(){
  const{data}=await sb.from("workspaces").select("data").eq("user_id",UID).maybeSingle();
  const d=(data&&data.data)||{};
  M=(d.ownership&&Array.isArray(d.ownership.people))?d.ownership:emptyModel();
  if(!M.people)M.people=[];if(!M.companies)M.companies=[];if(!M.accounts)M.accounts=[];
}
async function save(){
  if(!UID)return;
  const{data}=await sb.from("workspaces").select("data").eq("user_id",UID).maybeSingle();
  const d=(data&&data.data)||{};d.ownership=M;
  await sb.from("workspaces").upsert({user_id:UID,data:d});
}
/* ---------- document hub (Supabase Storage) — per entity: person OR company ---------- */
const entityRec=(kind,id)=>kind==="person"?person(id):kind==="account"?M.accounts.find(a=>a.id===id):company(id);
const DOC_TYPES=[["other","Document"],["br","Business Registration (BR)"],["incorp","Incorporation / NAR1"],["statement","Financial statement"],["agreement","Agreement"],["id","ID / passport"],["tax","Tax"]];
const findDoc=(kind,id,path)=>{const r=entityRec(kind,id);return r?(r.documents||[]).find(d=>d.path===path):null;};
async function uploadDocs(kind,ownerId,files){
  let n=0;
  for(const file of files){
    const safe=file.name.replace(/[^\w.\-]/g,"_");
    const path=UID+"/"+kind+"/"+ownerId+"/"+Date.now()+"_"+Math.random().toString(36).slice(2,7)+"_"+safe;
    const{error}=await sb.storage.from("documents").upload(path,file,{upsert:false});
    if(error){alert("Upload failed for "+file.name+": "+error.message+"\n\n(If it mentions a bucket, run storage-setup.sql first.)");continue;}
    const rec=entityRec(kind,ownerId);if(!rec)continue;rec.documents=rec.documents||[];
    rec.documents.push({name:file.name,nick:file.name,type:"other",path,size:file.size,at:new Date().toISOString().slice(0,10)});
    n++;
  }
  if(n){await save();render();}
}
async function previewDoc(path){
  const{data,error}=await sb.storage.from("documents").createSignedUrl(path,120);
  if(error){alert("Could not open: "+error.message);return;}
  window.open(data.signedUrl,"_blank");
}
async function downloadDoc(path){
  const{data,error}=await sb.storage.from("documents").createSignedUrl(path,120,{download:true});
  if(error){alert("Could not download: "+error.message);return;}
  const a=document.createElement("a"); a.href=data.signedUrl; a.download=""; document.body.appendChild(a); a.click(); a.remove();
}
async function deleteDoc(kind,ownerId,path){
  const{error}=await sb.storage.from("documents").remove([path]);
  if(error){alert("Delete failed: "+error.message);return;}
  const rec=entityRec(kind,ownerId);if(rec)rec.documents=(rec.documents||[]).filter(d=>d.path!==path);
  await save();render();
}
async function setDocNick(kind,id,path,v){const d=findDoc(kind,id,path);if(d){d.nick=v;await save();}}
async function setDocType(kind,id,path,v){const d=findDoc(kind,id,path);if(d){d.type=v;await save();render();}}
async function setDocYear(kind,id,path,v){const d=findDoc(kind,id,path);if(d){d.year=v;await save();render();}}
async function setDocRemark(kind,id,path,v){const d=findDoc(kind,id,path);if(d){d.remark=v;await save();}}
const brSort=(a,b)=>((b.year||b.at)||"").localeCompare((a.year||a.at)||"");
function docHub(kind,id,excludeType){
  const rec=entityRec(kind,id); let list=(rec&&rec.documents)||[];
  if(excludeType) list=list.filter(d=>d.type!==excludeType);
  const docs=list.slice().sort(brSort).map(d=>`<div style="border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px">
     <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
       <div style="flex:1;min-width:140px"><div style="font-weight:600;font-size:13.5px">${esc(d.name)}</div><div class="sub" style="margin:0">${d.at}</div></div>
       <button class="btn sm" title="Preview" aria-label="Preview" data-preview="${esc(d.path)}">👁</button>
       <button class="btn sm" data-dl="${esc(d.path)}">Download</button>
       <button class="del" data-deldoc="${kind}|${id}|${esc(d.path)}">Delete</button>
     </div>
     <input class="cell" data-docremark="${kind}|${id}|${esc(d.path)}" value="${esc(d.remark||'')}" placeholder="Remark…" style="width:100%;text-align:left;margin-top:8px"/>
  </div>`).join("")||`<div class="sub" style="margin-bottom:10px">No documents yet.</div>`;
  return `<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px"><div style="font-weight:700;font-size:15px;margin-bottom:8px">Document hub</div>${docs}
    <div style="display:flex;gap:10px;align-items:center"><div class="dropzone" data-drop="${kind}|${id}" style="flex:1;margin-top:0;padding:14px">Drag &amp; drop files here</div><button class="btn" data-uploadbtn="${kind}|${id}" style="white-space:nowrap">Upload</button></div>
    <input type="file" multiple data-docfile="${kind}|${id}" style="display:none"/></div>`;
}
function bindDocs(){
  document.querySelectorAll("[data-drop]").forEach(z=>{const key=z.dataset.drop,inp=document.querySelector('[data-docfile="'+key+'"]'),p=key.split("|");
    z.onclick=()=>inp.click();
    z.ondragover=e=>{e.preventDefault();z.classList.add("drag");};
    z.ondragleave=()=>z.classList.remove("drag");
    z.ondrop=async e=>{e.preventDefault();z.classList.remove("drag");if(e.dataTransfer.files.length)await uploadDocs(p[0],p[1],e.dataTransfer.files);};
    inp.onchange=async()=>{if(inp.files.length)await uploadDocs(p[0],p[1],inp.files);};
  });
  document.querySelectorAll("[data-uploadbtn]").forEach(b=>{const inp=document.querySelector('[data-docfile="'+b.dataset.uploadbtn+'"]');b.onclick=()=>inp.click();});
  document.querySelectorAll("[data-preview]").forEach(b=>b.onclick=()=>previewDoc(b.dataset.preview));
  document.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>downloadDoc(b.dataset.dl));
  document.querySelectorAll("[data-deldoc]").forEach(b=>b.onclick=async()=>{const p=b.dataset.deldoc.split("|");await deleteDoc(p[0],p[1],p[2]);});
  document.querySelectorAll("[data-docremark]").forEach(inp=>inp.onchange=async()=>{const p=inp.dataset.docremark.split("|");await setDocRemark(p[0],p[1],p[2],inp.value);});
}
/* ---------- model helpers ---------- */
const person=id=>M.people.find(p=>p.id===id);
const company=id=>M.companies.find(c=>c.id===id);
function ownersOf(a){ // [{personId,pct}]
  if(a.type==="company"){const c=company(a.companyId);return c?(c.shareholders||[]):[];}
  return a.holders||[];
}
function personNetWorth(pid){let t=0;M.accounts.forEach(a=>{const o=ownersOf(a).find(x=>x.personId===pid);if(o)t+=o.pct/100*a.balance;});return t;}
const totalAssets=()=>M.accounts.reduce((s,a)=>s+a.balance,0);
const BR_FIELDS=[
  {k:"brNumber",label:"BR / certificate no."},
  {k:"certType",label:"Certificate type"},
  {k:"branchName",label:"Business / branch name"},
  {k:"commencement",label:"Date of commencement"},
  {k:"expiry",label:"Date of expiry"},
  {k:"address",label:"Registered address"},
  {k:"nature",label:"Nature of business"},
  {k:"status",label:"Legal status"},
  {k:"form",label:"Form / ordinance"},
  {k:"fee",label:"Fee"},
  {k:"levy",label:"Levy"},
  {k:"totalFee",label:"Total fee & levy"},
  {k:"paymentDate",label:"Payment date"},
  {k:"receiptRef",label:"Receipt / transaction ref"},
  {k:"amountPaid",label:"Amount paid"}
];

/* ---------- render ---------- */
const TITLES={
  dashboard:["Dashboard","Look-through ownership across all accounts"],
  insights:["Insights","Where the wealth sits"],
  timeline:["Document log","Every document added across the workspace"],
  individual:["Individuals","People who own accounts"],
  company:["Companies","Legal entities and their shareholders"],
  accounts:["Bank accounts","Accounts and how they're owned"]
};
function companyList(){
  const create=`<div class="card"><h3>Add a company</h3><div class="sub">Add a company, then upload its Business Registration on the company page</div>
    <div style="margin-top:10px"><button class="btn primary" id="createNew">+ Create new</button></div></div>`;

function parseBR(text){
  const out={},t=(text||"").replace(/\r/g,"");
  let m=t.match(/(\d{8}-\d{3}-\d{2}-\d{2}-\d)/); if(m)out.brNumber=m[1];
  const dates=[...t.matchAll(/(\d{2}\/\d{2}\/\d{4})/g)].map(x=>x[1]);
  if(dates[0])out.commencement=dates[0]; if(dates[1])out.expiry=dates[1];
  m=t.match(/Name of [^\n]*\n+\s*([A-Z0-9][A-Z0-9 .,&'()\/-]{4,})/i); if(m)out.name=m[1].trim();
  if(!out.name){const lm=t.match(/([A-Z][A-Z0-9 .,&'()\/-]*(?:LIMITED|LTD|COMPANY)[A-Z0-9 .,&'()\/-]*)/); if(lm)out.name=lm[1].trim();}
  m=t.match(/Address[^\n]*\n([\s\S]{5,180}?)(?:Nature of|Status|業務性質|法律)/i); if(m)out.address=m[1].replace(/\s+/g," ").trim();
  if(/BODY CORPORATE/i.test(t))out.status="BODY CORPORATE";
  if(/\bCORP\b/.test(t))out.nature="CORP";
  if(/Chapter 310|Cap\.?\s*310/i.test(t))out.form="Form 2 (Cap. 310)";
  if(/ORIGINAL/i.test(t))out.certType="Original";
  return out;
}

function blobToB64(blob){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(",")[1]);r.onerror=rej;r.readAsDataURL(blob);}); }
async function fileToImage(file){
  if(/^image\//.test(file.type)) return { b64: await blobToB64(file), media: file.type };
  if(file.type==="application/pdf" && window.pdfjsLib){
    const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:2}); const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
    return { b64: cv.toDataURL("image/png").split(",")[1], media:"image/png" };
  }
  throw new Error("unsupported file type");
}
async function extractViaAI(file){            // calls the Supabase Edge Function (Claude vision) — falls back if not set up
  const {b64,media}=await fileToImage(file);
  const {data,error}=await sb.functions.invoke("extract-br",{body:{imageBase64:b64,mediaType:media}});
  if(error) throw error;
  if(!data||data.error) throw new Error((data&&data.error)||"no data");
  const f=data.fields||{}, out={};
  ["name"].concat(BR_FIELDS.map(x=>x.k)).forEach(k=>{ if(f[k]) out[k]=String(f[k]); });
  return out;
}
async function extractLocal(file){            // free in-browser OCR fallback
  if(/^image\//.test(file.type) && window.Tesseract){ const r=await Tesseract.recognize(file,"eng"); return parseBR(r.data.text); }
  if(file.type==="application/pdf" && window.pdfjsLib){
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const tc=await page.getTextContent();
    let text=tc.items.map(i=>i.str).join("\n");
    if(text.replace(/\s/g,"").length<40 && window.Tesseract){
      const vp=page.getViewport({scale:2}); const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
      const r=await Tesseract.recognize(cv,"eng"); text=r.data.text;
    }
    return parseBR(text);
  }
  return {};
}
async function extractFromFile(file){
  try{ const ai=await extractViaAI(file); if(ai && Object.keys(ai).length) return ai; }
  catch(e){ console.warn("AI extract unavailable — using in-browser OCR:", e.message||e); }
  return extractLocal(file);
}

  individual(){
    const addForm=`<div class="card"><h3>Add an individual</h3><div class="sub">People who can own accounts (single, joint, or via company shares)</div>
      <div class="row"><div class="field"><label class="lbl">Name</label><input id="npName" placeholder="e.g. Amy"/></div><button class="btn primary" id="addPerson">Add person</button></div></div>`;
    const rows=M.people.map(p=>`<div class="ownrow" style="padding:9px 0;border-bottom:1px solid var(--line)"><input class="cell" data-pname="${p.id}" value="${esc(p.name)}" style="flex:1;text-align:left;font-weight:600"/><button class="del" data-del-person="${p.id}">Remove</button></div>`).join("")||`<div class="hint">No individuals yet.</div>`;
    const list=`<div class="card"><h3>Individuals</h3><div class="sub">${M.people.length} ${M.people.length===1?"individual":"individuals"}</div><div style="margin-top:6px">${rows}</div></div>`;
    return addForm+list;
  },
  company(){ return openCompany ? companyDetail(openCompany) : companyList(); },
  accounts(){
    const single=M.people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
    const comps=M.companies.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");
    const rows=M.accounts.map(a=>{
      const own=ownersOf(a).map(o=>`${esc(person(o.personId)?person(o.personId).name:"?")}${o.pct!==100?" "+o.pct+"%":""}`).join(", ");
      const holder=a.type==="company"?("Company · "+esc(company(a.companyId)?(company(a.companyId).short||company(a.companyId).name):"?")):("Individual · "+(own||"—"));
      return `<tr><td><div style="font-weight:600">${esc(a.name)}</div><div style="color:var(--muted);font-size:11px">${esc(a.institution||"")}${a.number?" · "+esc(a.number):""}</div></td>
        <td><span class="pill ${a.type}">${a.type}</span></td>
        <td style="font-size:12.5px;color:var(--muted)">${holder}</td>
        <td class="num"><input class="cell" data-bal="${a.id}" type="number" value="${a.balance}" style="width:120px"/></td>
        <td class="num"><button class="del" data-del-acct="${a.id}">Remove</button></td></tr>`;
    }).join("")||`<tr><td colspan="5" class="hint">No accounts yet — add one above.</td></tr>`;
    return `<div class="card"><h3>Add an account</h3><div class="sub">Held by an individual or a company — this drives the per-person net worth</div>
      <div class="row" style="margin-bottom:10px">
        <div class="field" style="flex:2"><label class="lbl">Account name</label><input id="naName" placeholder="Operating Account"/></div>
        <div class="field"><label class="lbl">Type</label><select id="naType"><option value="individual">Individual</option><option value="company">Company</option></select></div>
      </div>
      <div class="row" style="margin-bottom:10px">
        <div class="field"><label class="lbl">Bank name</label><input id="naBank" placeholder="OCBC"/></div>
        <div class="field"><label class="lbl">Account number</label><input id="naNumber" placeholder="123-456789-001"/></div>
        <div class="field"><label class="lbl">Balance</label><input id="naBal" type="number" placeholder="0"/></div>
      </div>
      <div id="ownerArea"></div>
      <button class="btn primary" id="addAcct" style="margin-top:12px">Add account</button>
      <div class="warn" id="acctWarn" style="display:none"></div>
      <template id="tplIndividual"><label class="lbl">Account holder (individual)</label><select id="naPerson">${single||'<option value="">— add an individual first —</option>'}</select></template>
      <template id="tplCompany"><label class="lbl">Owned by company</label><select id="naCompany">${comps||'<option value="">— add a company first —</option>'}</select></template>
    </div>
    <div class="card"><h3>Accounts</h3><div class="sub">${M.accounts.length} ${M.accounts.length===1?"account":"accounts"}</div>
      <table><thead><tr><th>Account</th><th>Type</th><th>Held by</th><th class="num">Balance</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
};

/* ---------- per-view event binding ---------- */
const BIND={
  individual(){
    $("addPerson").onclick=async()=>{const n=$("npName").value.trim();if(!n)return;M.people.push({id:uid(),name:n});await save();render();};
    document.querySelectorAll("[data-del-person]").forEach(b=>b.onclick=async()=>{
      const id=b.dataset.delPerson;M.people=M.people.filter(p=>p.id!==id);
      M.companies.forEach(c=>c.shareholders=(c.shareholders||[]).filter(s=>s.personId!==id));
      M.accounts.forEach(a=>{if(a.holders)a.holders=a.holders.filter(h=>h.personId!==id);});
      await save();render();});
    document.querySelectorAll("[data-pname]").forEach(inp=>inp.onchange=async()=>{const p=person(inp.dataset.pname);if(p){p.name=inp.value.trim()||p.name;await save();render();}});
  },
  company(){ if(openCompany)bindCompanyDetail();else bindCompanyList(); },
  accounts(){
    const renderOwner=()=>{const t=$("naType").value;$("ownerArea").innerHTML=$("tpl"+t.charAt(0).toUpperCase()+t.slice(1)).innerHTML;};
    renderOwner();$("naType").onchange=renderOwner;
    $("addAcct").onclick=async()=>{
      const w=$("acctWarn");w.style.display="none";
      const name=$("naName").value.trim();if(!name){w.textContent="Enter an account name.";w.style.display="block";return;}
      const type=$("naType").value,bal=+$("naBal").value||0;
      const acct={id:uid(),name,institution:$("naBank").value.trim(),number:$("naNumber").value.trim(),balance:bal,type,documents:[]};
      if(type==="individual"){const pid=$("naPerson")&&$("naPerson").value;if(!pid){w.textContent="Add an individual first (Entity → Individual).";w.style.display="block";return;}acct.holders=[{personId:pid,pct:100}];}
      else{const cid=$("naCompany")&&$("naCompany").value;if(!cid){w.textContent="Add a company first.";w.style.display="block";return;}acct.companyId=cid;}
      M.accounts.push(acct);await save();render();
    };
    document.querySelectorAll("[data-bal]").forEach(inp=>inp.onchange=async()=>{const a=M.accounts.find(x=>x.id===inp.dataset.bal);if(a){a.balance=+inp.value||0;await save();render();}});
    document.querySelectorAll("[data-del-acct]").forEach(b=>b.onclick=async()=>{M.accounts=M.accounts.filter(a=>a.id!==b.dataset.delAcct);await save();render();});
  }
};

/* ---------- boot ---------- */
$("submit").onclick=doAuth;$("pass").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();});
$("logout").onclick=logout;
$("cf_cancel").onclick=closeCoForm;
$("cf_save").onclick=saveCoForm;
$("coForm").addEventListener("click",e=>{if(e.target.id==="coForm")closeCoForm();});
$("nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b){view=b.dataset.v;openCompany=null;coEdit=false;brEditMode=false;pendingCap=null;render();}});
setMode("login");wireSwitch();
</script>
