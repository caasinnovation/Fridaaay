/* ---------- auth ---------- */
function showErr(m){const e=$("authErr");e.textContent=m;e.classList.add("show");}
function clrErr(){$("authErr").classList.remove("show");}
function setMode(m){mode=m;clrErr();const s=m==="signup";$("suFields").classList.toggle("hidden",!s);
  $("authTitle").textContent=s?"Create your workspace":"Sign in";$("submit").textContent=s?"Create account":"Sign in";
  $("switch").innerHTML=s?`Have an account? <a id="toLogin">Sign in</a>`:`No account? <a id="toSignup">Create one</a>`;wireSwitch();}
function wireSwitch(){const a=$("toSignup"),b=$("toLogin");if(a)a.onclick=()=>setMode("signup");if(b)b.onclick=()=>setMode("login");}
function doAuth(){
  clrErr();const email=$("email").value.trim().toLowerCase(),pass=$("pass").value;
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email))return showErr("Enter a valid email.");
  if(pass.length<6)return showErr("Password must be at least 6 characters.");
  const s=mode==="signup",name=$("suName").value.trim(),firm=$("suFirm").value.trim();
  $("submit").disabled=true;$("submit").textContent="…";
  (async()=>{try{
    if(s){const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name,firm}}});if(error)throw error;
      if(!data.session){showErr("Account created — confirm via email, then sign in.");setMode("login");return;}}
    else{const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;}
    await afterAuth();
  }catch(e){showErr(e.message||"Error");}finally{$("submit").disabled=false;setMode(mode);}})();
}
async function afterAuth(){
  const{data:{user}}=await sb.auth.getUser();if(!user)return showErr("Sign-in failed.");
  UID=user.id;USER={name:(user.user_metadata||{}).name||user.email,email:user.email};
  $("uName").textContent=USER.name;$("uEmail").textContent=USER.email;
  await load();$("authScreen").classList.add("hidden");$("appRoot").classList.remove("hidden");render();publishBanks();setTimeout(preloadAllBanks,500);
}
async function logout(){try{await sb.auth.signOut();}catch(e){}UID=null;M=null;$("appRoot").classList.add("hidden");$("authScreen").classList.remove("hidden");$("pass").value="";setMode("login");}

/* ---------- data ---------- */

  {nickname:"CAAS BOC CHECKING",   beneficiary_name:"CAASBOCCHECKING",                account:"61120221757",     ccy:"HKD",bank:"BANK OF CHINA (HONG KONG) LTD (012)",    category:"Transfer to BOC CaaS",   remark:"CaaS – BOC checking account"},

  {nickname:"CHONG YAN SUEN",      beneficiary_name:"",                               account:"821-377785-833",  ccy:"HKD",bank:"HSBC (004)",                             category:"Administrative Expenses", remark:"Chong Yan Suen"},
  {nickname:"CHOREV",              beneficiary_name:"CHOREV CONSULTING INTERNATIONAL",account:"363455916883",    ccy:"HKD",bank:"HANG SENG BANK LTD (024)",               category:"Professional Fees",      remark:"Chorev Consulting International"},

async function load(){
  const{data}=await sb.from("workspaces").select("data").eq("user_id",UID).maybeSingle();
  const d=(data&&data.data)||{};
  M=(d.ownership&&Array.isArray(d.ownership.people))?d.ownership:emptyModel();
  if(!M.people)M.people=[];if(!M.companies)M.companies=[];if(!M.accounts)M.accounts=[];if(!M.payees)M.payees=[];if(!M.tx_annotations)M.tx_annotations={};
  if(M.payees.length===0){M.payees=SEED_PAYEES.map(p=>({...p,id:uid()}));await save();}
  else{let dirty=false;SEED_PAYEES.forEach(s=>{const e=M.payees.find(p=>p.nickname===s.nickname);if(e&&(e.category!==s.category||e.remark!==s.remark)){e.category=s.category;e.remark=s.remark;dirty=true;}});if(dirty)await save();}
}
async function save(){
  if(!UID)return;
  const{data}=await sb.from("workspaces").select("data").eq("user_id",UID).maybeSingle();
  const d=(data&&data.data)||{};d.ownership=M;
  await sb.from("workspaces").upsert({user_id:UID,data:d});
  publishBanks();
}
async function publishBanks(){
  try{
    const accts=((M&&M.accounts)||[]).map(a=>({bank:(a.institution||"").trim(),account:(a.number||"").trim(),type:a.type||"individual"})).filter(a=>a.bank);
  }catch(e){}
}
/* ---------- document hub (Supabase Storage) — per entity: person OR company ---------- */
const entityRec=(kind,id)=>kind==="person"?person(id):kind==="account"?M.accounts.find(a=>a.id===id):company(id);
const DOC_TYPES=[["other","Document"],["br","Business Registration (BR)"],["incorp","Incorporation / NAR1"],["statement","Financial statement"],["agreement","Agreement"],["id","ID / passport"],["tax","Tax"]];
const findDoc=(kind,id,path)=>{const r=entityRec(kind,id);return r?(r.documents||[]).find(d=>d.path===path):null;};
async function uploadDocs(kind,ownerId,files,docType){
  let n=0;
  for(const file of files){
    const safe=file.name.replace(/[^\w.\-]/g,"_");
    const path=UID+"/"+kind+"/"+ownerId+"/"+Date.now()+"_"+Math.random().toString(36).slice(2,7)+"_"+safe;
    const{error}=await sb.storage.from("documents").upload(path,file,{upsert:false});
    if(error){alert("Upload failed for "+file.name+": "+error.message+"\n\n(If it mentions a bucket, run storage-setup.sql first.)");continue;}
    const rec=entityRec(kind,ownerId);if(!rec)continue;rec.documents=rec.documents||[];
    rec.documents.push({name:file.name,nick:file.name,type:docType||"other",path,size:file.size,at:new Date().toISOString().slice(0,10)});
    n++;
  }
  if(n){await save();render();}
}
async function openPdf(bank, file){
  const path = bank + "/" + file;
  const {data, error} = await sb.storage.from('statements').createSignedUrl(path, 3600);
  if(error){ alert("Could not open PDF: " + error.message); return; }
  window.open(data.signedUrl, '_blank');
}
async function previewDoc(path){
  const{data,error}=await sb.storage.from("documents").createSignedUrl(path,120);
  if(error){alert("Could not open: "+error.message);return;}
  window.open(data.signedUrl,"_blank");

async function deleteDoc(kind,ownerId,path){

  let warn="";

  catch(e){ warn=e.message||String(e); }
  const rec=entityRec(kind,ownerId);if(rec)rec.documents=(rec.documents||[]).filter(d=>d.path!==path);

async function extractStatementDoc(kind,id,path){
  const d=findDoc(kind,id,path); if(!d||d.extracted) return;
  if(!/\.pdf$/i.test(d.name||"")){ alert("Only PDF statements can be auto-scanned."); return; }
  let blob;
  try{ const{data,error}=await sb.storage.from("documents").createSignedUrl(path,120); if(error) throw error; blob=await (await fetch(data.signedUrl)).blob(); }
  catch(e){ alert('Couldn\'t read "'+d.name+'" to scan: '+(e.message||e)); return; }
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=()=>res(String(r.result).split(",")[1]);r.readAsDataURL(blob);});
  let j;
  try{ const resp=await fetch("/api/extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({filename:d.name,base64:b64})}); j=await resp.json(); if(!resp.ok) throw new Error(j.error||"scan failed"); }
  catch(e){ alert('Auto-scan is only available in the local version.\n\nTo extract this statement, run the local server and use the Statement Extractor there.'); return; }
  d.extracted=true; d.stmtDate=j.statement_date; d.stmtTxns=j.added_transactions; await save();
  alert('✓ Scanned "'+d.name+'" — statement '+(j.statement_date||"?")+", "+(j.added_transactions||0)+" transactions added to the database.\nNow holding "+j.total_statements+" statements, "+j.total_transactions+" transactions.");
  render();
}

}

const _BANK_CACHE={};
async function loadStatementsDB(bank){
  if(bank && _BANK_CACHE[bank]) return _BANK_CACHE[bank];
  if(!bank && _BANK_CACHE["__all__"]) return _BANK_CACHE["__all__"];
  const t0=performance.now();
  const num=v=>(v===null||v===undefined||v==="")?null:parseFloat(v);
  let lines=[];
  let from=0; const PAGE=1000;
  while(true){
    let q=sb.from("statement_lines").select("*").order("statement_date",{ascending:true}).order("id",{ascending:true}).range(from,from+PAGE-1);
    if(bank) q=q.eq("bank",bank);
    const{data,error}=await q;
    if(error) throw new Error(error.message);
    lines=lines.concat(data||[]);
    if((data||[]).length<PAGE) break;
    from+=PAGE;
  }
  const seen=new Set(),statements=[];
  for(const l of lines){
    const k=`${l.bank}|${l.account_number||""}|${l.statement_date}`;
    if(!seen.has(k)){seen.add(k);statements.push({date:l.statement_date,bank:l.bank,file:l.source_file,meta:{account:l.account_number||"",holder:l.holder,bank:l.bank}});}
  }
  const balances=lines.filter(l=>l.row_type==="balance").map(l=>({statement_date:l.statement_date,bank:l.bank,section:l.section,account_name:l.details,account_number:l.account_number,ccy:l.ccy,credit_limit:num(l.credit_limit),balance:num(l.balance),hkd_equivalent:num(l.hkd_equivalent),drcr:l.drcr}));
  const transactions=lines.filter(l=>l.row_type==="transaction").map(l=>({id:l.id,statement_date:l.statement_date,bank:l.bank,section:l.section,ccy:l.ccy,date:l.txn_date,txn_date:l.txn_date,details:l.details,deposit:num(l.deposit),withdrawal:num(l.withdrawal),balance:num(l.balance),drcr:l.drcr,category:l.category||"",remark:l.remark||""}));
  const result={statements,balances,transactions};
  _BANK_CACHE[bank||"__all__"]=result;
  console.log(`[supabase${bank?" "+bank:""}] ${Math.round(performance.now()-t0)}ms — ${statements.length} stmts, ${transactions.length} txns`);
  return result;
}

  const portfolio=`<div style="padding:18px 24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 style="margin:0">Portfolio Summary</h3>${pdfBtn(false)}</div>

  const secName={hkd_savings:"HKD Savings",hkd_current:"HKD Current",fcy_savings:"Foreign Currency Savings"};

  const txnBlock=_txnSections.map(sk=>{

    return `<div style="font-weight:700;font-size:13.5px;margin:16px 0 6px">${secName[sk]}</div>
      <table><thead><tr><th>Date</th>${fcy?"<th>CCY</th>":""}<th>Details</th><th class="num">Deposit</th><th class="num">Withdrawal</th><th class="num">Balance</th></tr></thead><tbody>${body}</tbody></table>`;
  }).join("");
  const history=txns.length?`<div style="padding:18px 24px;border-top:1px solid var(--line)"><h3 style="margin:0">Transaction History</h3>${txnBlock}</div>`:"";

  // ---- Accounts tab: all transactions for this bank, grouped by year ----

  const years=[...new Set(allBankTxns.map(t=>(t.statement_date||"").slice(0,4)).filter(Boolean))].sort().reverse();
  const firstYear=years[0]||"";
  // Populate global for pagination + export (sort if requested)
  years.forEach(yr=>{
    let rows=allBankTxns.filter(t=>(t.statement_date||"").startsWith(yr));
    const s=ACCT_SORT[yr];
    if(s&&s.col){
      rows=rows.slice().sort((a,b)=>{

  const sumSubSection=(label,groupItems,color,yr)=>{

  const summaryPanel=yr=>{

    const secHeader=(title,total,color,sub)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2px solid var(--line);margin-bottom:4px"><div><h4 style="margin:0;font-size:14px">${title}</h4>${sub?`<div style="font-size:11px;color:var(--muted)">${sub}</div>`:""}</div><span style="font-size:15px;font-weight:720;color:${color}">${fmt(total)}</span></div>`;

    const inSection=depositsNet.length
      ?`<div style="margin-bottom:28px">${secHeader("Incoming",depTotal,"var(--accent)")}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">${sumThead}<tbody>${depositsNet.map(({t,i})=>sumRow(t,i,yr)).join("")}</tbody></table></div></div>`

    const outSection=withdrawalsNet.length

    return `<div style="padding:20px 24px">${inSection}${outSection}</div>`;
  };
  const yearPanels=years.map(yr=>{
    const rows=ACCT_TX[yr]||[];

    let pages="";
    for(let p=0;p<total;p++){

    return `<div data-yr-panel="${yr}" style="display:${yr===firstYear?"":"none"}">
      <div data-acct-view="tx" style="display:${ACCT_VIEW_MODE==='summary'?'none':''}"><div style="overflow-x:auto">${empty}${pages}</div>${pgBar}</div>
      <div data-acct-view="summary" style="display:${ACCT_VIEW_MODE==='summary'?'':'none'}">${summaryPanel(yr)}</div>
    </div>`;
  }).join("");
  const _vBtn=(mode,label)=>`<button id="acctViewBtn_${mode}" onclick="acctViewSwitch('${mode}')" style="font-family:inherit;font-size:12px;padding:5px 16px;border:none;cursor:pointer;transition:background .15s;background:${ACCT_VIEW_MODE===mode?'var(--accent)':'none'};color:${ACCT_VIEW_MODE===mode?'#fff':'var(--fg)'}">${label}</button>`;
  const viewToggle=`<div style="display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden">${_vBtn('tx','Transactions')}${_vBtn('summary','Summary')}</div>`;
  const accountsPanel=years.length
    ?`<div style="border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:center;justify-content:space-between"><div style="display:flex">${yearTabs}</div><div style="display:flex;align-items:center;gap:10px">${viewToggle}${exportBtn}${saveBtn}</div></div>${yearPanels}`
    :`<div style="padding:24px;color:var(--muted)">No transaction history yet.</div>`;

  const payeesPanel=(()=>{
    const list=M.payees||[];
    const rows=list.map(p=>`<tr>
      <td><b>${esc(p.nickname||"")}</b></td>
      <td style="color:var(--muted)">${esc(p.beneficiary_name||"")}</td>
      <td style="font-family:monospace;font-size:12px">${esc(p.account||"")}</td>
      <td>${esc(p.ccy||"")}</td>
      <td style="color:var(--muted);font-size:12px">${esc(p.bank||"")}</td>
      <td style="font-size:12px">${esc(p.category||"—")}</td>
      <td style="font-size:12px;color:var(--muted)">${esc(p.remark||"")}</td>

    </tr>`).join("")||`<tr><td colspan="8" style="padding:20px;color:var(--muted);text-align:center">No payees yet — add one above.</td></tr>`;
    return `<div style="padding:20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><h3 style="margin:0">Third Party Accounts</h3><div class="sub">Matched accounts auto-fill category &amp; remark in transactions</div></div>
        <button class="btn primary" onclick="openPayeeForm('new')">+ Add payee</button>
      </div>
      <div id="payeeFormArea" style="margin-bottom:4px"></div>
      <div class="card" style="padding:0;overflow:hidden">
        <table><thead><tr><th>Nickname</th><th>Beneficiary name</th><th>Account</th><th>CCY</th><th>Bank</th><th>Category</th><th>Remark</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
    </div>`;
  })();
  const tabBtn=(id,label,active)=>`<button id="tabBtn_${id}" onclick="stmtTab('${id}')" style="padding:12px 18px;font-size:13.5px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid ${active?"var(--accent)":"transparent"};color:${active?"var(--accent)":"var(--muted)"};margin-bottom:-1px">${label}</button>`;
  const showPayees=canonBank(bank)==="HSBC CaaS";
  const mainTabs=`<div style="display:flex;border-bottom:1px solid var(--line);padding:0 20px">${tabBtn("st","Statements",true)}${tabBtn("ac","Accounts",false)}${showPayees?tabBtn("py","Payees",false):""}</div>`;

  return `<div class="card" style="padding:0;overflow:hidden">${mainTabs}<div id="tabPanel_st">${head}${monthNav}${overview}${portfolio}${history}</div><div id="tabPanel_ac" style="display:none">${accountsPanel}</div>${showPayees?`<div id="tabPanel_py" style="display:none">${payeesPanel}</div>`:""}</div>`;

async function newCompanyFromBR(files){
  const base=files[0].name.replace(/\.[^.]+$/,"").replace(/[_-]+/g," ").trim();
  const c={id:uid(),name:base||"New company",short:"",shareholders:[],documents:[],br:{}};
  M.companies.push(c);openCompany=c.id;await save();
  await uploadDocs("company",c.id,files);
  const rec=company(c.id);if(rec&&(rec.documents||[]).length){rec.documents.forEach(d=>{if(!d.type||d.type==="other")d.type="br";});await save();render();}
}

function parseBR(text){
  const out={},t=(text||"").replace(/\r/g,"");
  let m=t.match(/(\d{8}-\d{3}-\d{2}-\d{2}-\d)/); if(m)out.brNumber=m[1];
  const dates=[...t.matchAll(/(\d{2}\/\d{2}\/\d{4})/g)].map(x=>x[1]);
  if(dates[0])out.commencement=dates[0]; if(dates[1])out.expiry=dates[1];
  m=t.match(/Name of [^\n]*\n+\s*([A-Z0-9][A-Z0-9 .,&'()\/-]{4,})/i); if(m)out.name=m[1].trim();
  if(!out.name){const lm=t.match(/([A-Z][A-Z0-9 .,&'()\/-]*(?:LIMITED|LTD|COMPANY)[A-Z0-9 .,&'()\/-]*)/); if(lm)out.name=lm[1].trim();}

function blobToB64(blob){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(",")[1]);r.onerror=rej;r.readAsDataURL(blob);}); }
async function fileToImage(file){
  if(/^image\//.test(file.type)) return { b64: await blobToB64(file), media: file.type };
  if(file.type==="application/pdf" && window.pdfjsLib){
    const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:2}); const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
    return { b64: cv.toDataURL("image/png").split(",")[1], media:"image/png" };
  }
  throw new Error("unsupported file type");
}
async function extractViaAI(file){            // calls the Supabase Edge Function (Claude vision) — falls back if not set up
  const {b64,media}=await fileToImage(file);
  const {data,error}=await sb.functions.invoke("extract-br",{body:{imageBase64:b64,mediaType:media}});
  if(error) throw error;
  if(!data||data.error) throw new Error((data&&data.error)||"no data");
  const f=data.fields||{}, out={};
  ["name"].concat(BR_FIELDS.map(x=>x.k)).forEach(k=>{ if(f[k]) out[k]=String(f[k]); });
  return out;
}
async function extractLocal(file){            // free in-browser OCR fallback
  if(/^image\//.test(file.type) && window.Tesseract){ const r=await Tesseract.recognize(file,"eng"); return parseBR(r.data.text); }
  if(file.type==="application/pdf" && window.pdfjsLib){
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const tc=await page.getTextContent();
    let text=tc.items.map(i=>i.str).join("\n");
    if(text.replace(/\s/g,"").length<40 && window.Tesseract){
      const vp=page.getViewport({scale:2}); const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
      const r=await Tesseract.recognize(cv,"eng"); text=r.data.text;
    }
    return parseBR(text);
  }
  return {};
}

function matchPayee(details){
  const d=(details||"").toUpperCase().replace(/[\s\-]/g,"");
  return (M.payees||[]).find(p=>{
    const acct=(p.account||"").replace(/[\s\-]/g,"");
    const bname=(p.beneficiary_name||"").toUpperCase().replace(/\s+/g,"");
    const nick=(p.nickname||"").toUpperCase().replace(/[\s\-]/g,"");
    if(acct&&acct.length>4&&d.includes(acct)) return true;
    if(bname&&bname.length>3&&d.includes(bname)) return true;
    // Statements truncate long names — match on first 12 chars of beneficiary name
    if(bname&&bname.length>14&&d.includes(bname.slice(0,12))) return true;
    // Nickname match for distinctive aliases (6+ chars)
    if(nick&&nick.length>=6&&d.includes(nick)) return true;
    return false;
  });
}

  const nums=new Set(((M&&M.accounts)||[]).filter(a=>canonBank(a.institution)===canonBank(bank)).map(a=>(a.number||"").replace(/\D/g,"")).filter(Boolean));
  let db=null;
  try{ db=await loadStatementsDB(bank); }catch(e){}
  const myStmts=db?(db.statements||[]).filter(s=>{
    if(canonBank(s.bank||"")!==canonBank(bank)) return false;
    if(!nums.size) return true;
    return nums.has(((s.meta&&s.meta.account)||"").replace(/\D/g,""));
  }):[];
  if(!myStmts.length){ el.innerHTML=bankNoData(bank,!!db); return; }
  const dates=myStmts.map(s=>s.date).filter(Boolean).sort();
  let i=dates.length-1;
  window._stmtNav=(d)=>{i=dates.indexOf(d);if(i<0)i=dates.length-1;draw();};
  window._stmtRedraw=()=>{const savedYr=ACCT_YEAR_ACTIVE;draw();stmtTab('ac');if(savedYr)acctYear(savedYr);acctViewSwitch(ACCT_VIEW_MODE);};
  const draw=()=>{
    el.innerHTML=hsbcStatementHTML(db,dates[i],bank,dates);
    const sel=$("stmtDateSel");
    if(sel) sel.onchange=()=>{const yr=sel.value;const yd=dates.filter(d=>d.startsWith(yr));if(yd.length){i=dates.indexOf(yd[yd.length-1]);draw();}};
  };
  draw();
}
function bankNoData(bank,dbOk){
  const accts=((M&&M.accounts)||[]).filter(a=>canonBank(a.institution)===canonBank(bank));
  const a0=accts[0]||{};
  const holder=(a0.holders||[]).map(h=>person(h.personId)?person(h.personId).name:"").filter(Boolean).join(", ");
  const head=`<div style="background:linear-gradient(135deg,#c00,#7a0000);color:#fff;padding:20px 26px">
    <div style="font-size:12px;letter-spacing:4px;font-weight:700;opacity:.9">${esc(bank)}</div>
    <div style="font-size:23px;font-weight:700;margin-top:3px">Statement</div>
    <div style="font-size:13.5px;margin-top:14px"><b>${esc(holder||"Account holder")}</b><br><span style="opacity:.85">Account ${esc(a0.number||"—")}${accts.length>1?" (+"+(accts.length-1)+" more)":""}</span></div></div>`;
  const msg=dbOk?`No statements extracted for ${esc(bank)} yet. Drop a PDF in this account's <b>Document hub</b> and tag it <b>Statement</b> to auto-scan it, or use the <a href="/cloud/statements.html" style="color:var(--accent)">Statement Extractor</a>.`:`The local statement database isn't reachable — start the local server to see ${esc(bank)} statements.`;
  return `<div class="card" style="padding:0;overflow:hidden">${head}<div style="padding:18px 24px"><div class="sub" style="line-height:1.7;margin:0">${msg}</div></div></div>`;
}

function parseAcctPaste(text){
  const out={};
  (text||"").split(/\r?\n/).forEach(line=>{
    let m=line.match(/^\s*([A-Za-z][A-Za-z .\/]*?)\s*[\t:]+\s*(.+?)\s*$/);
    if(!m) m=line.match(/^\s*([A-Za-z][A-Za-z .\/]*?)\s{2,}(.+?)\s*$/);
    if(!m) return;
    const k=m[1].toLowerCase().trim(), v=m[2].trim();
    if(/bank|institution/.test(k)) out.bank=v;
    else if(/account\s*name|statement|tier|product/.test(k)) out.accname=v;
    else if(/holder|account holder|^name$|name of/.test(k)) out.holder=v;
    else if(/account|^number$|^no$|^a\/c/.test(k)) out.number=v;
    else if(/balance/.test(k)) out.balance=v;
  });
  return out;
}

const BIND={
  async dashboard(){
    const el=$("dashBody"); if(!el) return;
    let db; try{ db=await loadStatementsDB(); }catch(e){ db={statements:[],balances:[],transactions:[]}; }
    const valOf=a=>{
      const num=(a.number||"").replace(/\D/g,""); if(!num) return 0;
      const mine=(db.statements||[]).filter(s=>((s.meta&&s.meta.account)||"").replace(/\D/g,"")===num);
      if(!mine.length) return 0;
      const latest=mine.slice().sort((x,y)=>(x.date||"").localeCompare(y.date||"")).pop();
      let v=0;
      (db.balances||[]).filter(b=>b.bank===latest.bank&&b.statement_date===latest.date).forEach(b=>{
        const h=(b.hkd_equivalent!=null?+b.hkd_equivalent:+b.balance)||0;
        if(b.section==="deposit"||b.section==="investment") v+=h;
        else if(b.section==="credit_card"||b.section==="credit_facility") v-=h;
      });
      return v;
    };
    const val={}; M.accounts.forEach(a=>val[a.id]=valOf(a));

function bindAccountDetail(){
  const a=M.accounts.find(x=>x.id===openAccount); if(!a){openAccount=null;return render();}
  $("backAcct").onclick=()=>{openAccount=null;acctEdit=false;render();};
  document.querySelectorAll("[data-acctab]").forEach(b=>b.onclick=()=>{openAccount=b.dataset.acctab;acctEdit=false;render();});
  if(acctEdit && $("eaType")){
    const holderNames=(a.holders||[]).map(h=>person(h.personId)?person(h.personId).name:"").filter(Boolean).join(", ");
    const renderEaOwner=()=>{
      $("eaOwnerArea").innerHTML = $("eaType").value==="company"
        ? `<label class="lbl">Owned by company</label><select id="eaCompany">${M.companies.map(c=>`<option value="${c.id}" ${a.companyId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")||'<option value="">— add a company first (Entity → Company) —</option>'}</select>`
        : `<label class="lbl">Account holder(s) — comma-separate two or more for a joint account</label><input id="eaHolders" value="${esc(holderNames)}" placeholder="e.g. Amy Ip, Ben Ip" list="eaPeople"/><datalist id="eaPeople">${M.people.map(p=>`<option value="${esc(p.name)}">`).join("")}</datalist>`;
    };
    renderEaOwner(); $("eaType").onchange=renderEaOwner;
  }
  const eb=$("editAcct");
  if(eb) eb.onclick=async()=>{
    if(acctEdit){
      a.institution=$("eaBank").value.trim(); a.name=a.institution||a.name||"Account"; a.number=$("eaNumber").value.trim();
      const type=$("eaType")?$("eaType").value:a.type;
      if(type==="company"){
        const cid=$("eaCompany")&&$("eaCompany").value;
        if(cid){ a.type="company"; a.companyId=cid; delete a.holders; }
      } else {
        const names=(($("eaHolders")&&$("eaHolders").value)||"").split(",").map(s=>s.trim()).filter(Boolean);
        a.type="individual"; delete a.companyId;
        if(names.length){ const pct=100/names.length; a.holders=names.map(nm=>{let p=M.people.find(x=>(x.name||"").toLowerCase()===nm.toLowerCase());if(!p){p={id:uid(),name:nm};M.people.push(p);}return {personId:p.id,pct};}); }
      }
      acctEdit=false; await save(); render(); return;
    }
    acctEdit=true; render();
  };
  document.querySelectorAll("[data-del-acct]").forEach(b=>b.onclick=async()=>{if(!confirm("Delete this account?"))return;M.accounts=M.accounts.filter(x=>x.id!==b.dataset.delAcct);openAccount=null;acctEdit=false;await save();render();});
  bindDocs();
  if(!acctEdit) loadAcctReport(a);
}

$("submit").onclick=doAuth;$("pass").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();});
$("logout").onclick=logout;
$("toChangePw").onclick=()=>{$("cpPanel").classList.toggle("hidden");};
$("toForgotPw").onclick=()=>{$("fpPanel").classList.toggle("hidden");$("cpPanel").classList.add("hidden");};
$("fpBtn").onclick=async()=>{
  const msg=$("fpMsg");
  const email=$("fpEmail").value.trim().toLowerCase();
  if(!email){msg.style.color="#b91c1c";msg.textContent="Please enter your email.";return;}
  $("fpBtn").disabled=true;msg.style.color="var(--muted)";msg.textContent="Sending…";
  try{
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
    if(error){msg.style.color="#b91c1c";msg.textContent="✗ "+error.message;}
    else{msg.style.color="#16a34a";msg.textContent="✓ Reset link sent — check your email (and spam folder).";}
  }catch(e){msg.style.color="#b91c1c";msg.textContent="✗ "+e.message;}
  $("fpBtn").disabled=false;
};
$("cpBtnL").onclick=async()=>{
  const msg=$("cpMsgL");
  const newPw=$("cpNewL").value,conPw=$("cpConL").value;
  if(!newPw||!conPw){msg.style.color="#b91c1c";msg.textContent="Please fill in all fields.";return;}
  if(newPw!==conPw){msg.style.color="#b91c1c";msg.textContent="New passwords do not match.";return;}
  if(newPw.length<8){msg.style.color="#b91c1c";msg.textContent="New password must be at least 8 characters.";return;}
  $("cpBtnL").disabled=true;msg.style.color="var(--muted)";msg.textContent="Updating…";
  try{
    const{error}=await sb.auth.updateUser({password:newPw});
    if(error){msg.style.color="#b91c1c";msg.textContent="✗ "+error.message;}
    else{msg.style.color="#16a34a";msg.textContent="✓ Password changed.";$("cpNewL").value="";$("cpConL").value="";}
  }catch(e){msg.style.color="#b91c1c";msg.textContent="✗ "+e.message;}
  $("cpBtnL").disabled=false;
};
$("cf_cancel").onclick=closeCoForm;
$("cf_save").onclick=saveCoForm;
$("coForm").addEventListener("click",e=>{if(e.target.id==="coForm")closeCoForm();});
$("nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b){view=b.dataset.v;openCompany=null;coEdit=false;brEditMode=false;pendingCap=null;render();}});
// When the user returns from the password-reset email, Supabase fires PASSWORD_RECOVERY.
// Show the "set new password" panel so they can complete the reset.
sb.auth.onAuthStateChange((event)=>{
  if(event==="PASSWORD_RECOVERY"){
    $("authScreen").classList.remove("hidden");
    $("appRoot").classList.add("hidden");
    $("fpPanel").classList.add("hidden");
    $("cpPanel").classList.remove("hidden");
    const m=$("cpMsgL"); if(m){m.style.color="var(--accent)";m.textContent="Reset link verified — enter your new password below.";}
  }
});
setMode("login");wireSwitch();
</script>
</body>
</html>
